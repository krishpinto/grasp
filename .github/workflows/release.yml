name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    name: Windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build CLI / MCP binary
        run: cargo build -p grasp-cli --release --locked

      - name: Download embedding model (bundled into the release)
        shell: pwsh
        run: |
          $dir = "dist/grasp/models/all-MiniLM-L6-v2"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $base = "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main"
          foreach ($f in @("config.json", "tokenizer.json", "model.safetensors")) {
            Invoke-WebRequest "$base/$f" -OutFile "$dir/$f"
          }

      - name: Assemble portable bundle
        shell: pwsh
        run: |
          Copy-Item target/release/grasp.exe dist/grasp/
          Compress-Archive -Path dist/grasp/* -DestinationPath grasp-windows-x64.zip -Force

      - name: Build desktop app installer (NSIS)
        run: pnpm tauri build

      - name: Collect installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter *-setup.exe -Path target/release/bundle/nsis | Select-Object -First 1
          if (-not $exe) { Write-Error "NSIS installer not found under target/release/bundle/nsis"; exit 1 }
          Copy-Item $exe.FullName "Grasp-Setup.exe"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            grasp-windows-x64.zip
            install.ps1
            Grasp-Setup.exe
          fail_on_unmatched_files: false
          generate_release_notes: true

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine:
    name: Rust engine + CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      # Build/test only the engine + CLI (skip the Tauri app, which needs
      # desktop system libraries that aren't relevant to the engine).
      - name: Build
        run: cargo build -p grasp-core -p grasp-cli --locked
      - name: Test
        run: cargo test -p grasp-core -p grasp-cli --locked

  frontend:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
